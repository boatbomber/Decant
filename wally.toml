[package]
name = "boatbomber/decant"
description = "Decompression in pure Luau"
version = "1.0.0"
license = "MIT"
authors = ["boatbomber (https://boatbomber.com)"]
registry = "https://github.com/upliftgames/wally-index"
realm = "shared"
include = [
    "src",
    "src/**",
    "wally.toml",
    "wally.lock",
    "default.project.json",
    "README.md",
]
exclude = ["**"]

[dev-dependencies]
Jest = "jsdotlua/jest@3.10.0"
JestGlobals = "jsdotlua/jest-globals@3.10.0"
